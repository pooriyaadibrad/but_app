{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>سامانه خوابگاه</title>
    <link rel="stylesheet" href="https://unpkg.com/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://unpkg.com/bs-brain@2.0.4/components/registrations/registration-5/assets/css/registration-5.css">
</head>
<body dir="rtl">
<!-- Registration 5 - Bootstrap Brain Component -->
  {% if messages %}
        {% for message in messages %}
            <div class="absolute top-0 bg-lime-500 px-4 py-2 text-white rounded-3xl ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
<section class="p-3 p-md-4 p-xl-5">
  <div class="container">
    <div class="card border-light-subtle shadow-sm">
      <div class="row g-0">
        <div class="col-12 col-md-6 text-bg-primary">
          <div class="d-flex align-items-center justify-content-center h-100">
            <div class="col-10 col-xl-8 py-3">
              <img class="img-fluid rounded mb-4" loading="lazy" src="{% static 'assest/images.jpeg' %}" width="245" height="80" alt="BootstrapBrain Logo">
              <hr class="border-primary-subtle mb-4">
              <h2 class="h1 mb-4">دانشگاه تخصصی فناوری نوین آمل</h2>
              <p class="lead m-0"></p>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="card-body p-3 p-md-4 p-xl-5">
            <div class="row">
              <div class="col-12">
                <div class="mb-5">
                  <h2 class="h3">فرم ثبت نام خوابگاه</h2>
                  <h3 class="fs-6 fw-normal text-secondary m-0">اطلاعات را لطفا با دقت پر کنید</h3>
                </div>
              </div>
            </div>
            <form  method="post" action="/register/">
                {% csrf_token %}
              <div class="row gy-3 gy-md-4 overflow-hidden">

                  {{ form.as_p }}
                <div class="col-12">
                  <div class="d-grid">
                    <button class="btn bsb-btn-xl btn-primary" type="submit">ثبت درخواست</button>
                  </div>
                </div>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
